<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriBox Secure Redirect</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #1e293b;
            font-size: 1.8rem;
            margin: 0.5rem 0;
            font-weight: 600;
        }
        
        .subtitle {
            color: #475569;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.5rem 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #334155;
            margin: 1rem 0;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .error-message {
            color: #dc2626;
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        
        .success-message {
            color: #16a34a;
            background: #dcfce7;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        
        .redirect-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .redirect-link:hover {
            background: #2563eb;
        }
        
        .note {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            color: #0f172a;
            margin-top: 1rem;
        }
        
        .info-text {
            background: #f8fafc;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
            font-size: 0.7rem;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="logo">🛡️</div>
        <h1>PriBox Secure Redirect</h1>
        <div class="subtitle">End-to-End Encrypted Sharing</div>
        
        <div class="spinner" id="spinner"></div>
        
        <div class="message" id="message">
            Checking redirect destination...
        </div>
        
        <div id="statusContainer"></div>
        <div id="manualLink"></div>
        
        <div class="security-badge">
            🔒 Secure Content Delivery
        </div>
        
        <div class="note" id="note">
            Fetching from secure database...
        </div>
    </div>
    
    <script>
        // Simple database path - just one level deep
        const DATABASE_URL = 'https://pribox-apps-default-rtdb.europe-west1.firebasedatabase.app';
        const REDIRECT_PATH = '/redirectUrl.json';  // Simple path without special characters
        const FALLBACK_URL = '';
        
        const FULL_URL = `${DATABASE_URL}${REDIRECT_PATH}`;
        
        async function fetchRedirectUrl() {
            const messageEl = document.getElementById('message');
            const spinner = document.getElementById('spinner');
            const statusContainer = document.getElementById('statusContainer');
            const noteEl = document.getElementById('note');
            
            try {
                if (messageEl) messageEl.innerHTML = 'Contacting database...';
                
                console.log('Fetching from:', FULL_URL);
                
                // Show the URL being queried
                if (statusContainer) {
                    statusContainer.innerHTML = `
                        <div class="info-text">
                            📡 Querying: ${FULL_URL}
                        </div>
                    `;
                }
                
                // Make request to Firebase REST API
                const response = await fetch(FULL_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Database response:', data);
                
                // Check if we got a valid URL string
                if (data && typeof data === 'string' && data.trim().length > 0) {
                    const redirectUrl = data.trim();
                    
                    if (redirectUrl.startsWith('http://') || redirectUrl.startsWith('https://')) {
                        if (messageEl) {
                            messageEl.innerHTML = '✓ Redirect URL found! Redirecting...';
                            messageEl.style.color = '#16a34a';
                        }
                        if (statusContainer) {
                            statusContainer.innerHTML += `<div class="success-message">✅ Found URL: ${redirectUrl}</div>`;
                        }
                        if (noteEl) noteEl.innerHTML = `Redirecting to ${redirectUrl}...`;
                        
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 1000);
                    } else {
                        if (messageEl) {
                            messageEl.innerHTML = '⚠️ Invalid URL format';
                            messageEl.style.color = '#dc2626';
                        }
                        statusContainer.innerHTML += `<div class="error-message">⚠️ Value is not a valid URL: "${redirectUrl}"</div>`;
                        showFallback();
                    }
                } else if (data && typeof data === 'object' && data !== null) {
                    // If data is an object, try to find a URL property
                    let foundUrl = null;
                    if (data.url) foundUrl = data.url;
                    else if (data.redirect) foundUrl = data.redirect;
                    else if (data.link) foundUrl = data.link;
                    else if (data.target) foundUrl = data.target;
                    
                    if (foundUrl && typeof foundUrl === 'string' && (foundUrl.startsWith('http://') || foundUrl.startsWith('https://'))) {
                        if (messageEl) {
                            messageEl.innerHTML = '✓ Redirect URL found! Redirecting...';
                            messageEl.style.color = '#16a34a';
                        }
                        statusContainer.innerHTML += `<div class="success-message">✅ Found URL: ${foundUrl}</div>`;
                        setTimeout(() => {
                            window.location.href = foundUrl;
                        }, 1000);
                    } else {
                        statusContainer.innerHTML += `<div class="error-message">⚠️ Database object found but no valid URL property.</div>`;
                        showFallback();
                    }
                } else if (data === null) {
                    statusContainer.innerHTML += `<div class="error-message">⚠️ No redirect URL found in database at path: /redirectUrl</div>`;
                    statusContainer.innerHTML += `<div class="info-text">💡 To set up: Add a string value at /redirectUrl in your Firebase database</div>`;
                    showFallback();
                } else {
                    throw new Error('Unexpected data format');
                }
                
            } catch (error) {
                console.error('Error:', error);
                
                if (messageEl) {
                    messageEl.innerHTML = '⚠️ Database error';
                    messageEl.style.color = '#dc2626';
                }
                
                let errorMsg = `<div class="error-message">❌ Error: ${error.message}</div>`;
                
                if (error.message.includes('403') || error.message.includes('Permission')) {
                    errorMsg += `<div class="error-message" style="margin-top:8px;">
                        🔧 <strong>Need to update Firebase Rules:</strong><br><br>
                        1. Go to <a href="https://console.firebase.google.com/project/pribox-apps/database/pribox-apps-default-rtdb/rules" target="_blank">Firebase Console → Realtime Database Rules</a><br>
                        2. Set rules to:<br>
                        <code style="display:block; margin-top:8px; background:#1e293b; color:#e2e8f0; padding:8px; border-radius:4px;">
                        {<br>
                        &nbsp;&nbsp;"rules": {<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;".read": true,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;".write": false<br>
                        &nbsp;&nbsp;}<br>
                        }
                        </code>
                        3. Click Publish
                    </div>`;
                }
                
                if (statusContainer) {
                    statusContainer.innerHTML += errorMsg;
                }
                
                showFallback();
            }
        }
        
        function showFallback() {
            const messageEl = document.getElementById('message');
            const spinner = document.getElementById('spinner');
            const manualLink = document.getElementById('manualLink');
            const noteEl = document.getElementById('note');
            
            if (spinner) spinner.style.display = 'none';
            if (messageEl) {
                messageEl.innerHTML = '⬇️ Using default destination';
                messageEl.style.color = '#f59e0b';
            }
            if (noteEl) {
                noteEl.innerHTML = 'Redirecting to PriBox Secure Share...';
            }
            if (manualLink) {
                manualLink.innerHTML = `<a href="${FALLBACK_URL}" class="redirect-link">Open PriBox Secure Share</a>`;
            }
            
            setTimeout(() => {
                window.location.href = FALLBACK_URL;
            }, 2000);
        }
        
        // Start the process
        fetchRedirectUrl();
    </script>
</body>
</html>
